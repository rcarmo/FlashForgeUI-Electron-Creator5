# Synthetic printer.cfg for Calibration Assistant local testing
# This file is intentionally representative of a FlashForge AD5M-style Klipper config.

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 5000
max_z_velocity: 20
max_z_accel: 100

[stepper_x]
step_pin: PC14
dir_pin: !PC15
enable_pin: !PE5
rotation_distance: 40
microsteps: 16
endstop_pin: ^PA1
position_endstop: 0
position_max: 220
homing_speed: 50

[stepper_y]
step_pin: PE3
dir_pin: !PE4
enable_pin: !PE2
rotation_distance: 40
microsteps: 16
endstop_pin: ^PA2
position_endstop: 0
position_max: 220
homing_speed: 50

[stepper_z]
step_pin: PB8
dir_pin: !PB9
enable_pin: !PB7
rotation_distance: 8
microsteps: 16
endstop_pin: probe:z_virtual_endstop
position_max: 220
position_min: -2
homing_speed: 8

[extruder]
step_pin: PB4
dir_pin: !PB5
enable_pin: !PB3
rotation_distance: 7.3
microsteps: 16
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
control: pid
pid_kp: 22.20
pid_ki: 1.08
pid_kd: 114.00
min_temp: 0
max_temp: 300

[heater_bed]
heater_pin: PB1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA3
control: pid
pid_kp: 54.027
pid_ki: 0.770
pid_kd: 948.182
min_temp: 0
max_temp: 120

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 15,15
mesh_max: 205,205
probe_count: 7,7
fade_start: 1.0
fade_end: 10.0
algorithm: bicubic

